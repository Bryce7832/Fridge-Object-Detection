<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fridge — Team 18</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        /* Team 18 Dark Blue Cyber-Tech Theme */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; overflow-x: hidden; }
        .header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-bottom: 2px solid #334155; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); flex-wrap: wrap; gap: 15px; }
        .header h1 { font-size: 26px; font-weight: 700; color: #f1f5f9; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }
        .header h1 span { color: #38bdf8; }
        .status-bar { display: flex; gap: 20px; font-size: 14px; color: #94a3b8; flex-wrap: wrap; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; box-shadow: 0 0 8px rgba(74, 222, 128, 0.5); }
        .status-dot.online { background: #4ade80; } .status-dot.offline { background: #f87171; box-shadow: 0 0 8px rgba(248, 113, 113, 0.5); } .status-dot.unknown { background: #fbbf24; }
        
        /* Reverted to 2-column layout, added responsiveness */
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
        
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); transition: transform 0.2s, box-shadow 0.2s; width: 100%; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.3); }
        .card h2 { font-size: 16px; font-weight: 600; color: #38bdf8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .full-width { grid-column: 1 / -1; }
        
        .scan-section { text-align: center; padding: 40px; background: linear-gradient(135deg, #262f3d 0%, #1e293b 100%); }
        .scan-btn { background: linear-gradient(135deg, #0ea5e9, #2563eb); color: white; border: none; padding: 18px 56px; font-size: 20px; font-weight: 700; border-radius: 14px; cursor: pointer; transition: all 0.2s; box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); text-transform: uppercase; letter-spacing: 1px; max-width: 100%; white-space: normal; }
        .scan-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(14, 165, 233, 0.5); }
        .scan-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .scan-status { margin-top: 20px; font-size: 14px; color: #cbd5e1; background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid #475569; word-wrap: break-word; }
        
        /* Auto-fitting horizontal layout to prevent trailing off page */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-top: 10px; }
        
        .stat-box { background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 20px; text-align: center; transition: all 0.2s; }
        .stat-box:hover { border-color: #38bdf8; transform: scale(1.03); }
        .stat-value { font-size: 36px; font-weight: 800; color: white; text-shadow: 0 0 10px rgba(56, 189, 248, 0.6); }
        .stat-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 6px; }
        
        .inventory-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .inventory-table th { text-align: left; padding: 12px; border-bottom: 2px solid #334155; color: #94a3b8; font-size: 13px; text-transform: uppercase; }
        .inventory-table td { padding: 12px; border-bottom: 1px solid #262f3d; font-size: 15px; }
        .inventory-table tr:last-child td { border-bottom: none; }
        .inventory-table tr:hover { background: #262f3d; }
        
        .confidence-bar-container { display: flex; align-items: center; gap: 10px; }
        .confidence-bar { width: 80px; height: 8px; background: #334155; border-radius: 4px; overflow: hidden; display: inline-block; }
        .confidence-fill { height: 100%; border-radius: 4px; transition: width 0.3s; box-shadow: 0 0 5px rgba(255,255,255,0.2); }
        .conf-high { background: #4ade80; box-shadow: 0 0 10px rgba(74, 222, 128, 0.4); } 
        .conf-med { background: #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.4); } 
        .conf-low { background: #f87171; box-shadow: 0 0 10px rgba(248, 113, 113, 0.4); }
        
        .chat-container { display: flex; flex-direction: column; height: 400px; }
        .chat-messages { flex: 1; overflow-y: auto; margin-bottom: 16px; padding-right: 10px; display: flex; flex-direction: column; }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .chat-msg { margin-bottom: 14px; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.6; max-width: 85%; }
        .chat-user { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        .chat-assistant { background: #334155; color: #f1f5f9; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .chat-input-row { display: flex; gap: 10px; }
        .chat-input { flex: 1; background: #0f172a; border: 2px solid #334155; color: white; padding: 12px 16px; border-radius: 10px; font-size: 15px; outline: none; transition: all 0.2s; min-width: 0; }
        .chat-input:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        .chat-send { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 15px; transition: all 0.2s; }
        .chat-send:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-1px); }
        .chat-send:disabled { opacity: 0.6; }
        
        .firebase-btn { background: #f59e0b; color: #0f172a; border: none; padding: 12px 28px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 15px; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; width: 100%; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3); }
        .firebase-btn:hover:not(:disabled) { background: #d97706; transform: translateY(-1px); box-shadow: 0 6px 15px rgba(245, 158, 11, 0.4); }
        .firebase-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .firebase-status { margin-top: 12px; font-size: 14px; color: #cbd5e1; text-align: center; background: #0f172a; padding: 8px; border-radius: 8px; border: 1px solid #334155; }
        .empty-state { text-align: center; padding: 60px 20px; color: #64748b; font-size: 15px; font-style: italic; background: #0f172a; border-radius: 12px; border: 1px dashed #334155; }
        .loading-spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        window.APP_CONFIG = {
            firebaseEnabled: {{ firebase_enabled | tojson }}
        };
    </script>

    <script type="text/babel" src="{{ url_for('static', filename='js/components/Header.jsx') }}"></script>
    <script type="text/babel" src="{{ url_for('static', filename='js/components/StatsGrid.jsx') }}"></script>
    <script type="text/babel" src="{{ url_for('static', filename='js/components/InventoryTable.jsx') }}"></script>
    <script type="text/babel" src="{{ url_for('static', filename='js/components/RecipeAssistant.jsx') }}"></script>
    <script type="text/babel" src="{{ url_for('static', filename='js/App.jsx') }}"></script>
</body>
</html>
